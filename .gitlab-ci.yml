stages:
  - package

.package-defaults: &package-defaults
  stage: package
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache zip bash

package-power:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh power
  artifacts:
    name: aidlc-sprint-planning-power
    paths:
      - dist/aidlc-sprint-planning-power.zip
    expire_in: never

package-skill:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh skill
  artifacts:
    name: aidlc-sprint-planning-skill
    paths:
      - dist/aidlc-sprint-planning-skill.zip
    expire_in: never

package-cli:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh cli
  artifacts:
    name: aidlc-sprint-planning-cli
    paths:
      - dist/aidlc-sprint-planning-cli.zip
    expire_in: never
