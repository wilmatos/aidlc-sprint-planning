stages:
  - package

.package-defaults: &package-defaults
  stage: package
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache zip bash
    - mkdir -p dist

package-power:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh power
    - find AgentDevAidlcPower -name ".DS_Store" -delete
    - cd AgentDevAidlcPower
    - find . -not -name ".DS_Store" -not -path "./__MACOSX/*" | zip ../dist/aidlc-mob-elaboration-power.zip -@
  artifacts:
    name: aidlc-mob-elaboration-power
    paths:
      - dist/aidlc-mob-elaboration-power.zip
    expire_in: never

package-skill:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh skill
    - find AgentDevAidlcSkill -name ".DS_Store" -delete
    - cd AgentDevAidlcSkill
    - find . -not -name ".DS_Store" -not -path "./__MACOSX/*" | zip ../dist/aidlc-mob-elaboration-skill.zip -@
  artifacts:
    name: aidlc-mob-elaboration-skill
    paths:
      - dist/aidlc-mob-elaboration-skill.zip
    expire_in: never

package-cli:
  <<: *package-defaults
  script:
    - bash scripts/copy-common.sh cli
    - find AgentDevAidlcCLI -name ".DS_Store" -delete
    - cd AgentDevAidlcCLI
    - find . -not -name ".DS_Store" -not -path "./__MACOSX/*" | zip ../dist/aidlc-mob-elaboration-cli.zip -@
  artifacts:
    name: aidlc-mob-elaboration-cli
    paths:
      - dist/aidlc-mob-elaboration-cli.zip
    expire_in: never
