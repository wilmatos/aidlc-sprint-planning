stages:
  - package

package-power:
  stage: package
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache zip
  script:
    - zip -r aidlc-mob-elaboration.zip aidlc-mob-elaboration/
  artifacts:
    paths:
      - aidlc-mob-elaboration.zip
    expire_in: never
